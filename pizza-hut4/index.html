<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>480x320</title>
    <meta name="ad.size" content="width=480,height=320">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
  <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
</head>
<body>

  <div id="loader-container">
    <div class="circle"></div>
  </div>

  <div class="ad" id="ad">
    <div id="stage">
      <!-- CONTENIDO PORTRAIT 640×1080 -->
      <section id="viewPortrait" class="only-portrait panel" aria-label="Vista Portrait 640x1080">
                <div class="positionAb bg_P"><img src="images/bgGameP.jpg" ></div>

                <div class="positionAb cheese"><img src="images/cheese.png" ></div>
                <div class="positionAb hand-left"><img src="images/hand-left.png" ></div>
                <div class="positionAb hand-right"><img src="images/hand-right.png" ></div>

                <div class="positionAb logo"><img src="images/logo.png" ></div>    

                <div class="positionAb txt-1-1"><img src="images/txt-1-1.png" ></div>                
                <div class="positionAb txt-1-2"><img src="images/txt-1-2.png" ></div>                
                <div class="positionAb txt-2-1"><img src="images/txt-2-1.png" ></div>                
                <div class="positionAb txt-2-2"><img src="images/txt-2-2.png" ></div>  


                <div class="positionAb txt-3-1"><img src="images/txt-3-1.png" ></div>                
                <div class="positionAb txt-3-2"><img src="images/txt-3-2.png" ></div>      

                <a href="https://www.pizzahut.com.au/menu/pizza/" target="_blank">
                <div id="orderNow" class="positionAb orderNow">
                  <img src="images/orderNow.png" >
                </div>  
                </a>   

                <div id="cta_find" class="positionAb find"><img src="images/find.png" ></div>  
                <div id="closeMap" class="positionAb close"><img src="images/close.png" ></div>        
                

                <div class="positionAb hand"><img src="images/hand.png" ></div>                  


                  <div class="wrap positionAb ">
                    <div class="card" id="scratchCard">
                      <div class="reveal" id="revealLayer"></div>
                      <canvas id="scratch"></canvas>
                    </div>

                    <div class="hud positionAb">
                    <button id="resetBtn">Reset</button>
                    <div class="meta"><span id="pct">0%</span> raspado</div>
                    </div>
                </div>

                <div class="positionAb txt-0-1"><img src="images/txt-0-1.png" ></div>                
                <div class="positionAb txt-0-2"><img src="images/txt-0-2.png" ></div>                
                <div class="positionAb txt-0-3"><img src="images/txt-0-3.png" ></div>                


        <div class="frame" aria-hidden="true"></div>
      </section>

                  <div class="bgMap positionAb  ">


                        <button id="btnGeo" type="button" style="
                          position:absolute; z-index:9999; right:12px; top:12px;
                          padding:10px 12px; border-radius:10px; border:0;
                          background:#ed2024; color:#fff; font-weight:600; cursor:pointer;
                        ">
                          Enable my location
                        </button>

                        <div id="mapLoader" style="
                          position:absolute;
                          inset:0;
                          background:rgba(255,255,255,0.92);
                          display:flex;
                          align-items:center;
                          justify-content:center;
                          flex-direction:column;
                          z-index:9998;
                          opacity:0;
                          pointer-events:none;
                          transition:opacity .3s ease;
                        ">
                          <div class="spinner"></div>
                          <p style="margin-top:12px;font-weight:600;color:#ed2024;">
                            Searching for nearby stores...
                          </p>
                        </div>                        

                        <div id="map"></div>
                </div>

      <!-- CONTENIDO LANDSCAPE 1024×600 -->
      <section id="viewLandscape" class="only-landscape panel" aria-label="Vista Landscape 1024x600">

                <div class="positionAb bg"><img src="images/bg-game.jpg" ></div>

             

        <div class="frame" aria-hidden="true"></div>

      </section>


   

                <div id="clickTag" class="positionAb fullSize"></div>





    </div>
  </div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.3/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

<script src="main.js"></script>  
</body>





</html>
